/* ---- design/tokens.css, inlined verbatim (scaffold convention: no separate stylesheet request) ---- */
:root{
  /* color */
  --sd-bg: #EFE8DB;            /* app background — one step below paper */
  --sd-card: #FBF7EF;          /* card surface = the illustrations' paper. Never themed. */
  --sd-ink: #211B12;
  --sd-ink-2: #6E6455;
  --sd-accent: #2F6B3F;        /* vermouth green */
  --sd-accent-pressed: #24522F;
  --sd-save: var(--sd-accent); /* swipe right — saving IS the brand action */
  --sd-skip: #A03B2E;          /* swipe left — muted brick red, still gesture feedback not error */
  --sd-line: rgba(33,27,18,.14);
  --sd-shadow: 0 1px 2px rgba(33,27,18,.06), 0 12px 32px -12px rgba(33,27,18,.25);

  /* type */
  --sd-font-display: 'Instrument Serif', Georgia, 'Times New Roman', serif;
  --sd-font-ui: 'Work Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;

  /* motion */
  --sd-ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.35); /* the only overshoot in the app */
  --sd-ease-fly:    cubic-bezier(0.33, 0.85, 0.55, 1);      /* inherits finger velocity, lands soft */
  --sd-ease-flip:   cubic-bezier(0.4, 0.1, 0.15, 1);
  --sd-ease-list:   cubic-bezier(0.2, 0, 0, 1);
  --sd-t-spring: 420ms;  --sd-t-fly: 320ms;  --sd-t-flip: 480ms;
  --sd-t-list: 240ms;    --sd-t-micro: 140ms;
}

@media (prefers-color-scheme: dark){
  :root{
    --sd-bg: #17130E;
    --sd-ink: #EDE5D6;
    --sd-ink-2: #A79B87;
    --sd-accent: #7FB56F;
    --sd-accent-pressed: #9CCB8A; /* pressed goes LIGHTER on dark */
    --sd-skip: #DE8070;
    --sd-line: rgba(237,229,214,.16);
    --sd-shadow: 0 2px 4px rgba(0,0,0,.4), 0 16px 40px -12px rgba(0,0,0,.6);
    /* --sd-card intentionally unchanged — the illustrations are painted on warm-white
       paper regardless of theme; the deck reads as lit cards on a dark bar top. */
  }
}

@media (prefers-reduced-motion: reduce){
  :root{ --sd-t-spring: 0ms; --sd-t-fly: 0ms; --sd-t-flip: 0ms; --sd-t-list: 0ms; --sd-t-micro: 0ms; }
}

/* Work Sans defaults to proportional oldstyle figures — force this on every amount display. */
.amount{ font: 500 16px/1.4 var(--sd-font-ui); font-variant-numeric: lining-nums tabular-nums; }

/* ---- scaffold layout (BACKLOG item 1) ---- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{min-height:100dvh;font:400 16px/1.5 var(--sd-font-ui);background:var(--sd-bg);color:var(--sd-ink);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.wrap{max-width:640px;margin:0 auto;padding:1.25rem 1.25rem calc(6rem + env(safe-area-inset-bottom))}
header.brand{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:1rem;padding:.5rem 0 1rem}
.brand-copy{display:flex;flex-direction:column;gap:.35rem;min-width:0}
header.brand .wordmark{color:var(--sd-ink);width:112px;height:auto;display:block}
header.brand .tagline{font:500 .8rem/1.4 var(--sd-font-ui);color:var(--sd-ink-2);letter-spacing:.02em}
.wheel-entry{display:flex;align-items:center;gap:.45rem;min-height:54px;padding:.3rem .75rem .3rem .3rem;
  border:1px solid var(--sd-line);border-radius:999px;background:var(--sd-card);color:#211B12;
  box-shadow:0 8px 24px -16px rgba(33,27,18,.45);font:600 .7rem/1.15 var(--sd-font-ui);
  max-width:132px;transition:transform var(--sd-t-micro) var(--sd-ease-list),box-shadow var(--sd-t-micro) linear}
.wheel-entry:hover{transform:translateY(-1px);box-shadow:var(--sd-shadow)}
.wheel-entry:active{transform:translateY(0) scale(.98)}
.wheel-entry:focus-visible{outline:3px solid var(--sd-accent);outline-offset:3px}
.wheel-entry[hidden]{display:none}
.wheel-symbol{width:46px;height:46px;flex:0 0 46px;display:block;view-transition-name:wheel-shared}
.wheel-symbol .wheel-sector:nth-of-type(even){fill:#ece1cd}
.header-icons{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.search-entry{display:flex;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0;
  border:1px solid var(--sd-line);border-radius:999px;background:var(--sd-card);color:#211B12;
  box-shadow:0 8px 24px -16px rgba(33,27,18,.45);transition:transform var(--sd-t-micro) var(--sd-ease-list),box-shadow var(--sd-t-micro) linear}
.search-entry:hover{transform:translateY(-1px);box-shadow:var(--sd-shadow)}
.search-entry:active{transform:translateY(0) scale(.98)}
.search-entry:focus-visible{outline:3px solid var(--sd-accent);outline-offset:3px}
.search-symbol{width:20px;height:20px}

.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--sd-card);
  border-top:1px solid var(--sd-line);box-shadow:var(--sd-shadow);z-index:10;
  padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav a{flex:1;text-align:center;padding:.75rem .25rem;font:500 .68rem/1.2 var(--sd-font-ui);
  letter-spacing:.03em;color:var(--sd-ink-2);border-top:2px solid transparent}
.bottom-nav a.active{color:var(--sd-accent);border-top-color:var(--sd-accent)}

.screen-title{font:400 2rem/1.1 var(--sd-font-display);margin-bottom:1rem}
.empty{color:var(--sd-ink-2);text-align:center;padding:3rem 1rem}
.list-card{background:var(--sd-card);border-radius:12px;box-shadow:var(--sd-shadow);padding:1rem 1.1rem;
  margin-bottom:.75rem}
.list-card .name{font:400 1.3rem/1.2 var(--sd-font-display)}
.list-card .meta{font:500 .8rem/1.4 var(--sd-font-ui);color:var(--sd-ink-2);margin-top:.15rem}
.deck-count{color:var(--sd-ink-2);font:500 .85rem/1.4 var(--sd-font-ui);margin-bottom:.75rem}
.deck-count .amount{font-size:.85rem}
.filters{display:grid;gap:.65rem;margin-bottom:.75rem;padding:.8rem 1rem;border:1px solid var(--sd-line);
  border-radius:12px}
.filters label{font:500 .82rem/1.4 var(--sd-font-ui)}
.filter-toggle{display:flex;align-items:center;gap:.45rem}
.filter-toggle input{accent-color:var(--sd-accent);width:1rem;height:1rem}
.filter-select{display:flex;align-items:center;justify-content:space-between;gap:1rem}
.filter-select select{min-width:9rem;padding:.35rem 1.8rem .35rem .55rem;border:1px solid var(--sd-line);
  border-radius:8px;background:var(--sd-card);color:#211B12;font:500 .82rem/1.3 var(--sd-font-ui)}

/* ---- deck & cards (BACKLOG item 4) ---- */
.deck{position:relative;height:min(64vh,540px);max-width:340px;margin:0 auto 2rem;perspective:1200px}
.card{position:absolute;inset:0;border-radius:16px;touch-action:none;cursor:grab;
  user-select:none;-webkit-user-select:none;
  transition:transform var(--sd-t-list) var(--sd-ease-list)}
.card:focus-visible{outline:3px solid var(--sd-accent);outline-offset:3px}
.card[data-depth="1"]{transform:translateY(12px) scale(.964);pointer-events:none}
.card[data-depth="2"]{transform:translateY(24px) scale(.928);pointer-events:none}
.card[data-depth="3"]{transform:translateY(24px) scale(.928);opacity:0;pointer-events:none}
.card-inner{position:absolute;inset:0;transform-style:preserve-3d;
  transition:transform var(--sd-t-flip) var(--sd-ease-flip)}
.card.flipped .card-inner{transform:rotateY(180deg)}
/* faces live on the illustrations' paper — fixed paper-ink palette, never dark-mode inverted */
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--sd-card);color:#211B12;border-radius:16px;box-shadow:var(--sd-shadow);
  padding:1.1rem;display:flex;flex-direction:column;overflow:hidden}
.card-back{transform:rotateY(180deg)}
.card-name{font:400 1.6rem/1.15 var(--sd-font-display);margin:.4rem 0 .1rem}
.card-meta{font:500 .8rem/1.4 var(--sd-font-ui);color:#6E6455}
.card-art{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.glass-ph{width:38%;max-height:100%;color:#6E6455;opacity:.55}
.cocktail-art{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;
  pointer-events:none;-webkit-user-drag:none;
  transition:opacity var(--sd-t-list) var(--sd-ease-list)}
.cocktail-art.loaded{opacity:1}
.card-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.6rem}
.chip{border:1px solid rgba(33,27,18,.18);border-radius:999px;padding:.12rem .6rem;
  font:500 .72rem/1.4 var(--sd-font-ui);color:var(--sd-ink)}
.chip.missing{color:var(--sd-ink-2);opacity:.55}
.ing{list-style:none;margin:.5rem 0;flex-shrink:0}
.ing li{display:flex;gap:.6rem;padding:.22rem 0;font:400 .92rem/1.4 var(--sd-font-ui)}
.ing li .amount{min-width:4.2em;text-align:right}
.ing li.missing{color:var(--sd-ink-2);opacity:.55}
.card-method{font:400 .85rem/1.5 var(--sd-font-ui);color:#211B12;overflow-y:auto;min-height:0}
.card-ctrl{margin-top:auto;padding-top:.7rem;display:flex;align-items:center;justify-content:space-between}
.stepper{display:flex;align-items:center;gap:.7rem}
.stepper button,.units button{border:1px solid rgba(33,27,18,.18);border-radius:8px;color:#211B12;
  padding:.3rem .65rem;font:500 .85rem/1 var(--sd-font-ui);background:none}
.servings-input{width:3.8rem;padding:.3rem .25rem;border:1px solid rgba(33,27,18,.18);
  border-radius:8px;background:#fbf7ef;color:#211b12;text-align:center;font:500 .85rem/1 var(--sd-font-ui);
  appearance:textfield;-moz-appearance:textfield}
.servings-input::-webkit-inner-spin-button,.servings-input::-webkit-outer-spin-button{appearance:none;margin:0}
.units{display:flex;gap:.3rem}
.units button.active{background:#2F6B3F;border-color:#2F6B3F;color:#FBF7EF}
/* gesture tint: opacity-only per frame (composited), fixed paper-palette colors */
.tint{position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:0;
  transition:opacity var(--sd-t-micro) linear}
.tint-save{box-shadow:inset 0 0 0 3px #2F6B3F}
.tint-skip{box-shadow:inset 0 0 0 3px #A03B2E}
dl.settings{display:grid;grid-template-columns:auto 1fr;gap:.4rem 1rem;font-size:.95rem}
dl.settings dt{color:var(--sd-ink-2)}
dl.settings dd{min-width:0}
.account{margin:1.5rem 0;padding-top:1rem;border-top:1px solid var(--sd-line)}
.account h2{font:400 1.3rem/1.2 var(--sd-font-display);margin-bottom:.5rem}
.account p{font:400 .88rem/1.4 var(--sd-font-ui);color:var(--sd-ink-2);margin-bottom:.6rem}
.account-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.account button{border:1px solid rgba(33,27,18,.18);border-radius:8px;padding:.45rem .8rem;
  color:#211B12;font:500 .82rem/1.2 var(--sd-font-ui);background:var(--sd-card)}
.account a{text-decoration:underline;text-underline-offset:2px}
.account-form label{display:block;font:500 .82rem/1.3 var(--sd-font-ui);color:var(--sd-ink-2);margin:.6rem 0 .3rem}
.account-form input{display:block;width:100%;margin-top:.25rem;padding:.5rem .6rem;border:1px solid rgba(33,27,18,.18);
  border-radius:8px;font:400 .9rem/1.2 var(--sd-font-ui);color:#211B12;background:var(--sd-card)}
.warn{color:var(--sd-skip);font:500 .8rem/1.4 var(--sd-font-ui);margin-top:.5rem}
.lang-toggle{display:flex;gap:.3rem;flex-wrap:wrap}
.lang-toggle button{border:1px solid var(--sd-line);border-radius:8px;padding:.35rem .65rem;
  color:var(--sd-ink);font:500 .82rem/1.2 var(--sd-font-ui)}
.lang-toggle button.active{background:var(--sd-accent);border-color:var(--sd-accent);color:var(--sd-bg)}

/* ---- favorites: compact art rows + continuous recipe detail ---- */
.fav-row{display:flex;align-items:center;gap:.55rem;color:#211B12}
.fav-open{display:flex;align-items:center;gap:.85rem;flex:1;min-width:0;text-align:left;color:#211B12}
.fav-open:focus-visible,.fav-copy:focus-visible{outline:3px solid var(--sd-accent);outline-offset:2px}
.fav-thumb{position:relative;width:64px;height:80px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;background:var(--sd-card);border-radius:8px;overflow:hidden}
.fav-thumb .glass-ph{width:58%;opacity:.6}
.fav-info{display:block;flex:1;min-width:0}
.fav-info .name,.fav-info .meta{display:block}
.fav-missing{display:block;font:500 .76rem/1.4 var(--sd-font-ui);color:var(--sd-ink-2);margin-top:.1rem}
.fav-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;gap:.5rem}
.fav-back,.fav-remove{border:1px solid rgba(33,27,18,.18);border-radius:8px;padding:.35rem .65rem;
  color:var(--sd-ink-2);font:500 .78rem/1.2 var(--sd-font-ui)}
.fav-detail{display:grid;gap:1rem}
.fav-hero,.fav-recipe{background:var(--sd-card);color:#211B12;border-radius:16px;box-shadow:var(--sd-shadow);
  padding:1.1rem}
.fav-detail-art{position:relative;height:min(52vh,360px);display:flex;align-items:center;justify-content:center}
.fav-detail-art .glass-ph{width:35%;max-height:80%;color:#6E6455;opacity:.55}
.fav-recipe h2,.fav-recipe h3{font:600 1rem/1.3 var(--sd-font-ui)}
.fav-recipe h3{margin-top:1.25rem}
.fav-recipe-controls{display:flex;align-items:center;justify-content:space-between;gap:.75rem;
  margin:.8rem 0 1.2rem}
.fav-hint{color:#6E6455;font:.8rem/1.4 var(--sd-font-ui);margin:.25rem 0 .65rem}
.fav-ing-list{border-top:1px solid rgba(33,27,18,.14)}
.fav-ing-row{display:grid;grid-template-columns:auto 4.8rem 1fr;align-items:center;gap:.55rem;
  padding:.65rem 0;border-bottom:1px solid rgba(33,27,18,.14);font:.88rem/1.35 var(--sd-font-ui)}
.fav-ing-row input{width:1.05rem;height:1.05rem;accent-color:#2F6B3F}
.fav-ing-row .amount{text-align:right;font-size:.82rem}
.fav-ing-row.done span{text-decoration:line-through;color:#6E6455}
.fav-ing-row.pantry-missing span:last-child{color:var(--sd-ink-2)}
.fav-method{margin-top:.45rem;font:.88rem/1.55 var(--sd-font-ui)}
.fav-source{text-align:right;margin-top:.7rem;font:500 .7rem/1.4 var(--sd-font-ui);color:#6E6455}
.fav-source a{text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:2px}
.fav-source a:focus-visible{outline:2px solid #2F6B3F;outline-offset:3px}
.fav-copy{margin-top:1.25rem;border-radius:9px;padding:.65rem .9rem;background:#2F6B3F;color:#FBF7EF;
  font:600 .85rem/1.2 var(--sd-font-ui)}

/* ---- pantry (BACKLOG item 7) ---- */
.pantry-intro{color:var(--sd-ink-2);font-size:.88rem;margin:-.4rem 0 1.2rem}
.pantry-group{border:0;margin:0 0 1.2rem}
.pantry-group legend{font:400 1.3rem/1.2 var(--sd-font-display);margin-bottom:.55rem}
.pantry-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.5rem}
.pantry-item{display:flex;align-items:center;gap:.5rem;min-width:0;padding:.65rem .7rem;
  border:1px solid var(--sd-line);border-radius:10px;background:var(--sd-card);color:#211B12;
  font:500 .76rem/1.3 var(--sd-font-ui)}
.pantry-item input{accent-color:#2F6B3F;flex-shrink:0;width:1rem;height:1rem}
.pantry-item span{min-width:0}
.pantry-almost-title{font:400 1.3rem/1.2 var(--sd-font-display);margin:0 0 .55rem}
.pantry-almost-list{display:grid;gap:.5rem}
.pantry-almost-row{display:flex;flex-direction:column;text-align:left;color:#211B12}

/* ---- spinning wheel: full-screen bar-order chooser ---- */
body.wheel-mode,body.search-mode{overflow:hidden}
body.wheel-mode>.wrap,body.search-mode>.wrap{max-width:none;padding:0}
body.wheel-mode .brand,body.wheel-mode .bottom-nav,body.search-mode .brand,body.search-mode .bottom-nav{display:none}
.search-body{width:min(100%,520px);margin:.2rem auto 0;padding:0 1.25rem 2rem}
.search-body .list-card{align-self:stretch}
.search-input{display:block;width:100%;margin:.5rem 0 1rem;padding:.6rem .8rem;border:1px solid rgba(33,27,18,.18);
  border-radius:8px;font:400 1rem/1.2 var(--sd-font-ui);color:#211B12;background:var(--sd-card)}
.wheel-screen{position:fixed;inset:0;z-index:30;overflow:auto;background:var(--sd-bg);
  padding:max(.7rem,env(safe-area-inset-top)) max(1rem,env(safe-area-inset-right))
    max(1rem,env(safe-area-inset-bottom)) max(1rem,env(safe-area-inset-left))}
.wheel-topbar{width:min(100%,640px);margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;min-height:46px;gap:.75rem}
.wheel-back,.wheel-sound{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;
  min-width:44px;min-height:44px;border:1px solid var(--sd-line);border-radius:999px;color:var(--sd-ink-2);
  font:600 .74rem/1 var(--sd-font-ui)}
.wheel-back{justify-self:start;padding:0 .8rem}
.wheel-sound{justify-self:end;width:44px;font-size:1rem}
.wheel-back:focus-visible,.wheel-sound:focus-visible,.wheel-action:focus-visible,.wheel-range:focus-visible{
  outline:3px solid var(--sd-accent);outline-offset:3px}
.wheel-top-wordmark{display:grid;place-items:center;width:90px;padding:.12rem .35rem;border-radius:10px;background:#fbf7ef}
.wheel-top-wordmark img{display:block;width:100%;height:auto}
.wheel-body{width:min(100%,520px);margin:.2rem auto 0;display:flex;flex-direction:column;align-items:center}
.wheel-heading{text-align:center;min-height:4.2rem;margin:0 0 .5rem}
.wheel-heading h1{font:400 1.75rem/1.1 var(--sd-font-display)}
.wheel-heading p{margin-top:.18rem;color:var(--sd-ink-2);font:500 .76rem/1.35 var(--sd-font-ui)}
.wheel-emoji{display:inline-block;margin-right:.28rem;font-family:system-ui,sans-serif}
.wheel-stage{position:relative;width:min(84vw,390px);aspect-ratio:1;margin:.1rem auto .6rem;
  display:grid;place-items:center;filter:drop-shadow(0 16px 18px rgba(33,27,18,.14))}
.wheel-disc{width:100%;height:100%;border-radius:50%;background:var(--sd-card);will-change:transform;
  view-transition-name:wheel-shared;transform:rotate(0deg)}
.wheel-disc svg{width:100%;height:100%;display:block;overflow:visible}
.wheel-rim{fill:none;stroke:#211B12;stroke-width:1.15}
.wheel-sector{stroke:#211B12;stroke-opacity:.28;stroke-width:.38}
.wheel-sector:nth-of-type(even){fill:#f4ede2}
.wheel-sector:nth-of-type(odd){fill:#fbf7ef}
.wheel-sector-label{fill:#211B12;font:600 2.8px/1 var(--sd-font-ui);letter-spacing:.01em;
  paint-order:stroke;stroke:#fbf7ef;stroke-width:.7px;stroke-linejoin:round}
.wheel-art-ring{fill:#fbf7ef;stroke:rgba(33,27,18,.18);stroke-width:.35}
.wheel-art{pointer-events:none}
.wheel-hub{fill:#fbf7ef;stroke:#211b12;stroke-width:1.1}
.wheel-hub-dot{fill:#2f6b3f}
.wheel-hub-button{position:absolute;z-index:2;left:50%;top:50%;width:19%;aspect-ratio:1;border-radius:50%;
  transform:translate(-50%,-50%);display:grid;place-items:center;background:#fbf7ef;color:#211b12;
  border:1px solid rgba(33,27,18,.3);box-shadow:0 4px 12px rgba(33,27,18,.16);
  font:600 clamp(.58rem,2.5vw,.76rem)/1 var(--sd-font-ui);text-transform:uppercase;letter-spacing:.05em}
.wheel-hub-button:active:not(:disabled){transform:translate(-50%,-50%) scale(.94)}
.wheel-hub-button:focus-visible{outline:3px solid var(--sd-accent);outline-offset:3px}
.wheel-hub-button:disabled{opacity:.55;cursor:not-allowed}
.wheel-pointer{position:absolute;z-index:3;top:-.4rem;left:50%;width:2.2rem;height:2.7rem;
  transform:translateX(-50%);filter:drop-shadow(0 3px 3px rgba(33,27,18,.22))}
.wheel-pointer::before{content:"";position:absolute;inset:0;background:var(--sd-accent);
  clip-path:polygon(50% 100%,5% 15%,22% 0,78% 0,95% 15%);border-radius:7px}
.wheel-pointer.tick{animation:wheel-pointer-tick 90ms ease-out}
@keyframes wheel-pointer-tick{50%{transform:translateX(-50%) rotate(7deg);transform-origin:50% 10%}}
.wheel-win .wheel-sector[data-winning="true"]{filter:brightness(.92);stroke:#2f6b3f;stroke-width:1.1}
.wheel-neutral{opacity:.58}
.wheel-controls{width:min(100%,430px);padding:.8rem 1rem 1rem;border:1px solid var(--sd-line);
  border-radius:16px;background:var(--sd-bg);
  background:color-mix(in srgb,var(--sd-bg) 72%,transparent);backdrop-filter:blur(8px)}
.wheel-controls-title{text-align:center;font:600 .78rem/1.3 var(--sd-font-ui);color:var(--sd-ink-2)}
.wheel-range{width:100%;height:2rem;margin:.3rem 0 0;accent-color:var(--sd-accent);cursor:pointer;background:transparent}
.wheel-range::-webkit-slider-runnable-track{height:4px;border-radius:999px;background:linear-gradient(90deg,var(--sd-accent),var(--sd-line))}
.wheel-range::-webkit-slider-thumb{appearance:none;width:22px;height:22px;margin-top:-9px;border-radius:50%;
  border:3px solid var(--sd-card);background:var(--sd-accent);box-shadow:0 0 0 1px var(--sd-ink-2)}
.wheel-range::-moz-range-track{height:4px;border-radius:999px;background:var(--sd-line)}
.wheel-range::-moz-range-progress{height:4px;border-radius:999px;background:var(--sd-accent)}
.wheel-range::-moz-range-thumb{width:17px;height:17px;border-radius:50%;border:3px solid var(--sd-card);
  background:var(--sd-accent);box-shadow:0 0 0 1px var(--sd-ink-2)}
.wheel-controls.unset .wheel-range{opacity:.65}
.wheel-stops{display:flex;justify-content:space-between;padding:0 .15rem;color:var(--sd-ink-2);
  font:500 .64rem/1 var(--sd-font-ui)}
.wheel-actions{display:flex;justify-content:center;gap:.55rem;flex-wrap:wrap;margin-top:.75rem}
.wheel-action{min-height:44px;padding:.65rem 1rem;border:1px solid var(--sd-line);border-radius:999px;
  color:var(--sd-ink);font:600 .78rem/1 var(--sd-font-ui)}
.wheel-action.primary{min-width:8.5rem;background:var(--sd-accent);border-color:var(--sd-accent);color:var(--sd-bg)}
.wheel-action:disabled{opacity:.42;cursor:not-allowed}
.wheel-result{width:min(100%,430px);margin:.6rem auto 0;padding:.6rem .9rem;background:var(--sd-card);color:#211b12;
  border-radius:16px;box-shadow:var(--sd-shadow);display:grid;grid-template-columns:56px 1fr;align-items:center;gap:.7rem}
.wheel-result[hidden]{display:none}
.wheel-result-art{width:56px;height:56px;border-radius:12px;object-fit:contain;background:#fbf7ef}
.wheel-result-label{font:600 .66rem/1.2 var(--sd-font-ui);color:#6e6455;text-transform:uppercase;letter-spacing:.08em}
.wheel-result-name{font:400 1.35rem/1.12 var(--sd-font-display);margin-top:.12rem}
.wheel-result-name .fav-open{padding:0;text-align:left;text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}
.wheel-result-note{font:500 .72rem/1.35 var(--sd-font-ui);color:#6e6455;margin-top:.25rem}
.wheel-live{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
/* The wheel route is one composed scene: the disc travels first, then its controls settle around it. */
::view-transition-old(root),::view-transition-new(root),
::view-transition-old(wheel-shared),::view-transition-new(wheel-shared){mix-blend-mode:normal}
::view-transition-group(wheel-shared){z-index:40;animation-duration:760ms;
  animation-timing-function:cubic-bezier(.16,1,.3,1)}

html.wheel-opening::view-transition-old(root){animation:wheel-scene-old-out 420ms cubic-bezier(.4,0,1,1) both}
html.wheel-opening::view-transition-new(root){animation:wheel-scene-new-in 620ms cubic-bezier(.16,1,.3,1) both}
html.wheel-opening::view-transition-old(wheel-shared){animation:wheel-mini-out 300ms cubic-bezier(.4,0,.8,1) both}
html.wheel-opening::view-transition-new(wheel-shared){animation:wheel-disc-in 760ms cubic-bezier(.16,1,.3,1) both}

html.wheel-closing::view-transition-group(wheel-shared){animation-duration:620ms;
  animation-timing-function:cubic-bezier(.7,0,.2,1)}
html.wheel-closing::view-transition-old(root){animation:wheel-scene-close-old 360ms cubic-bezier(.4,0,1,1) both}
html.wheel-closing::view-transition-new(root){animation:wheel-scene-close-new 560ms 80ms cubic-bezier(.16,1,.3,1) both}
html.wheel-closing::view-transition-old(wheel-shared){animation:wheel-disc-out 620ms cubic-bezier(.7,0,.2,1) both}
html.wheel-closing::view-transition-new(wheel-shared){animation:wheel-mini-in 620ms cubic-bezier(.7,0,.2,1) both}

@keyframes wheel-scene-old-out{
  to{opacity:0;transform:scale(.985)}
}
@keyframes wheel-scene-new-in{
  from{opacity:0;transform:scale(1.012)}
  45%{opacity:1}
  to{opacity:1;transform:scale(1)}
}
@keyframes wheel-mini-out{
  0%{opacity:1;transform:scale(1) rotate(0)}
  70%,100%{opacity:0;transform:scale(.9) rotate(-8deg)}
}
@keyframes wheel-disc-in{
  0%,20%{opacity:0;transform:scale(.9) rotate(-5deg)}
  58%{opacity:1;transform:scale(1.018) rotate(.8deg)}
  78%{transform:scale(.995) rotate(-.2deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
@keyframes wheel-scene-close-old{
  to{opacity:0;transform:scale(1.012)}
}
@keyframes wheel-scene-close-new{
  from{opacity:0;transform:scale(.988)}
  to{opacity:1;transform:scale(1)}
}
@keyframes wheel-disc-out{
  0%,42%{opacity:1;transform:scale(1) rotate(0)}
  100%{opacity:0;transform:scale(.94) rotate(5deg)}
}
@keyframes wheel-mini-in{
  0%,50%{opacity:0;transform:scale(.86) rotate(7deg)}
  82%{opacity:1;transform:scale(1.06) rotate(-1deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}

/* Browsers without same-document View Transitions still get a deliberate entrance/exit. */
html.wheel-fallback-opening .wheel-screen{animation:wheel-fallback-screen-in 520ms cubic-bezier(.16,1,.3,1) both}
html.wheel-fallback-opening .wheel-stage{animation:wheel-fallback-disc-in 680ms cubic-bezier(.16,1,.3,1) both}
html.wheel-fallback-opening .wheel-topbar{animation:wheel-fallback-chrome-in 420ms 90ms cubic-bezier(.16,1,.3,1) both}
html.wheel-fallback-opening .wheel-heading{animation:wheel-fallback-chrome-in 440ms 150ms cubic-bezier(.16,1,.3,1) both}
html.wheel-fallback-opening .wheel-controls{animation:wheel-fallback-chrome-in 460ms 215ms cubic-bezier(.16,1,.3,1) both}
html.wheel-fallback-closing .wheel-screen{animation:wheel-fallback-screen-out 400ms cubic-bezier(.4,0,1,1) both}
html.wheel-fallback-closing .wheel-stage{animation:wheel-fallback-disc-out 400ms cubic-bezier(.4,0,1,1) both}
@keyframes wheel-fallback-screen-in{
  from{opacity:0;transform:scale(1.012)}
  to{opacity:1;transform:scale(1)}
}
@keyframes wheel-fallback-disc-in{
  from{opacity:0;transform:scale(.76) rotate(-6deg)}
  68%{opacity:1;transform:scale(1.018) rotate(.8deg)}
  to{opacity:1;transform:scale(1) rotate(0)}
}
@keyframes wheel-fallback-chrome-in{
  from{opacity:0;transform:translateY(12px) scale(.988)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes wheel-fallback-screen-out{
  to{opacity:0;transform:scale(.985)}
}
@keyframes wheel-fallback-disc-out{
  to{opacity:0;transform:scale(.72) rotate(5deg)}
}

@media (max-width:370px){
  .wheel-entry{max-width:116px;padding-right:.55rem}.wheel-symbol{width:42px;height:42px;flex-basis:42px}
  .wheel-stage{width:min(88vw,340px)}.wheel-controls{padding:.65rem .75rem .8rem}
}
@media (max-height:700px){
  .wheel-heading{min-height:3.4rem}.wheel-stage{width:min(66vh,330px)}
  .wheel-controls{padding:.55rem .8rem .7rem}.wheel-actions{margin-top:.5rem}
}
@media (orientation:landscape) and (max-height:560px){
  .wheel-body{width:min(100%,880px);display:grid;grid-template-columns:min(66vh,350px) minmax(280px,1fr);
    grid-template-areas:"wheel heading" "wheel controls" "wheel result";column-gap:1.25rem;align-items:center}
  .wheel-heading{grid-area:heading;align-self:end}.wheel-stage{grid-area:wheel;width:min(66vh,350px);margin:0}
  .wheel-controls{grid-area:controls;align-self:start}.wheel-result{grid-area:result;margin-top:.5rem}
}
@media (prefers-reduced-motion:reduce){
  ::view-transition-group(wheel-shared){animation-duration:0ms}.wheel-pointer.tick{animation:none}
  html.wheel-fallback-opening .wheel-screen,html.wheel-fallback-opening .wheel-stage,
  html.wheel-fallback-opening .wheel-topbar,html.wheel-fallback-opening .wheel-heading,
  html.wheel-fallback-opening .wheel-controls,html.wheel-fallback-closing .wheel-screen,
  html.wheel-fallback-closing .wheel-stage{animation:none}
}
